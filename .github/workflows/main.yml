name: Wallester Automation CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create certs directory
        run: mkdir -p certs

      - name: Setup Private Key from Base64 Secret
        shell: bash
        run: |
          # Берем строку Base64 из секретов и превращаем её в реальный файл .pem
          echo "${{ secrets.RSA_PRIVATE_KEY }}" | base64 -d > certs/private.pem
          # Устанавливаем права доступа, чтобы система не ругалась на открытый ключ
          chmod 600 certs/private.pem

      - name: Build Docker image
        run: docker build -t wallester-tests .

      - name: Run Tests in Docker
        run: docker run --rm wallester-tests
